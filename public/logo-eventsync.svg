<svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Calendar icon -->
  <g>
    <!-- Main calendar -->
    <rect x="4" y="10" width="24" height="28" rx="2" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    <!-- Calendar days grid -->
    <line x1="4" y1="18" x2="28" y2="18" stroke="#8b5cf6" stroke-width="1"/>
    <line x1="4" y1="22" x2="28" y2="22" stroke="#8b5cf6" stroke-width="0.8" opacity="0.6"/>
    <line x1="4" y1="26" x2="28" y2="26" stroke="#8b5cf6" stroke-width="0.8" opacity="0.6"/>
    <!-- Calendar tabs -->
    <rect x="8" y="6" width="3" height="4" rx="1" fill="#8b5cf6"/>
    <rect x="20" y="6" width="3" height="4" rx="1" fill="#8b5cf6"/>
    <!-- Sync arrow -->
    <path d="M20 28 Q22 26 24 28" stroke="#4f46e5" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M12 28 Q10 26 8 28" stroke="#4f46e5" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Highlight dot -->
    <circle cx="14" cy="24" r="1.5" fill="#4f46e5" opacity="0.8"/>
  </g>
  
  <!-- Text "EventSync" -->
  <text x="36" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#f8fafc" letter-spacing="-0.3">EventSync</text>
</svg>